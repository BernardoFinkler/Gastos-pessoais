spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gastos_pessoais
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: 3f5b8e2a1d9c4f7e0a6b3d8c2e5f1a4b7d0e3f6a9c2b5e8d1f4a7c0e3b6d9f2
  expiration-access: 900000
  expiration-refresh: 604800000
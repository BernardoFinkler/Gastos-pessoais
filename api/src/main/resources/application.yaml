spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gastos_pessoais
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: sua-chave-secreta-aqui-minimo-256-bits
  expiration-access: 900000       # 15 minutos em ms
  expiration-refresh: 604800000   # 7 dias em ms